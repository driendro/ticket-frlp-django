{% extends 'base.html' %}

{% block title %}Modificar Usuario{% endblock %}
{% block navbar %}{% include 'admin_panel/_navbar.html' %}{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-10 my-3">
            <h1>Modificar usuario {{ usuario.documento }}</h1>
            <form method="post">
                {% csrf_token %}
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Legajo:</label>
                    <div class="col-sm-3">
                        <input type="number" class="form-control"
                               name="legajo" value="{{ usuario.legajo }}">
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">DNI:</label>
                    <div class="col-sm-3">
                        <input type="number" class="form-control"
                               name="documento" value="{{ usuario.documento }}">
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Nombre:</label>
                    <div class="col-sm-3">
                        <input type="text" class="form-control"
                               name="nombre" value="{{ usuario.first_name }}">
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Apellido:</label>
                    <div class="col-sm-3">
                        <input type="text" class="form-control"
                               name="apellido" value="{{ usuario.last_name }}">
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">E-Mail:</label>
                    <div class="col-sm-3">
                        <input type="email" class="form-control"
                               name="email" value="{{ usuario.email }}">
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Claustro:</label>
                    <div class="col-sm-3">
                        <select class="form-select" name="claustro">
                            <option value="Estudiante"
                                {% if usuario.tipo == 'Estudiante' %}selected{% endif %}>
                                Estudiante
                            </option>
                            <option value="Docente"
                                {% if usuario.tipo == 'Docente' %}selected{% endif %}>
                                Docente
                            </option>
                            <option value="No Docente"
                                {% if usuario.tipo == 'No Docente' %}selected{% endif %}>
                                No Docente
                            </option>
                        </select>
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Especialidad:</label>
                    <div class="col-sm-3">
                        <select class="form-select" name="especialidad">
                            <option value="">-</option>
                            {% for val, label in especialidad_choices %}
                            <option value="{{ val }}"
                                {% if usuario.especialidad == val %}selected{% endif %}>
                                {{ label }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row mb-2">
                    <label class="col-sm-2 col-form-label">Tiene beca:</label>
                    <div class="col-sm-3">
                        <select class="form-select" name="beca">
                            <option value="No"
                                {% if not usuario.es_becado %}selected{% endif %}>No</option>
                            <option value="Si"
                                {% if usuario.es_becado %}selected{% endif %}>Si</option>
                        </select>
                    </div>
                </div>
                <div class="mt-3">
                    <button type="submit" class="btn btn-success">
                        Actualizar usuario
                    </button>
                    <a href="{% url 'admin_panel:index' %}"
                       class="btn btn-secondary ms-2">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

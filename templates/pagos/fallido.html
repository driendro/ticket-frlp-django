{% extends 'base.html' %}
{% block title %}Pago Fallido{% endblock %}
{% block navbar %}{% include 'comedor/_navbar.html' %}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body text-center p-5">
                    <div class="mb-4">
                        <i class="bi bi-x-circle-fill text-danger"
                           style="font-size: 5rem;"></i>
                    </div>
                    <h2 class="fw-bold mb-3">El pago fue rechazado</h2>
                    <p class="text-muted mb-4">
                        Hubo un problema con el pago.
                        Por favor intentá nuevamente o contactanos.
                    </p>
                    <a href="{% url 'comedor:index' %}" class="btn btn-danger btn-lg px-5">
                        Volver a comprar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

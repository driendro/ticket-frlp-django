    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="{% url 'comedor:index' %}">
            <i class="bi bi-ticket-detailed-fill me-1"></i> Ticket
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarHeader">

        <div class="collapse navbar-collapse" id="navbarHeader">
            <ul class="navbar-nav ms-auto align-items-center">

                    <a class="nav-link" href="{% url 'comedor:menu' %}">

                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'comedor:faq' %}">

                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'comedor:contacto' %}">

                    </a>
                </li>

                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">

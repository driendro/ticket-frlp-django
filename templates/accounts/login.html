{% extends 'base.html' %}
{% load static %}

{% block title %}Acceso al Comedor - UTN FRLP{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col my-4">
            <img class="img-fluid mx-auto d-block"
                 src="{% static 'img/logo_comedor.png' %}"
                 alt="Logo Comedor UTN FRLP"
                 style="max-width: 250px;">
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 text-center mb-2">
            <p style="font-size: larger; font-weight: bold;">
                Pedí tu usuario
                <a href="https://forms.gle/dt6NBGTLEsgbcaWS7" target="_blank">ACÁ</a>.
            </p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-6 col-md-5 col-xl-4 my-3">
            <form method="post">
                {% csrf_token %}
                <div class="form-group mb-4">
                    <input type="number"
                           class="form-control"
                           placeholder="Ingrese su DNI"
                           name="documento"
                           required>
                </div>
                <div class="form-group mb-4">
                    <input type="password"
                           class="form-control"
                           placeholder="Su contraseña"
                           name="password"
                           required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">
                        Ingresar
                    </button>
                    <a href="{% url 'accounts:password_reset' %}"
                       class="btn btn-primary mt-2">
                        Restablecer contraseña
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

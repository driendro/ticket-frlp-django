{% extends 'base.html' %}

{% block title %}Recuperar Contraseña{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col my-4">
            <img class="img-fluid mx-auto d-block"
                 src="/static/img/logo_comedor.png"
                 alt="Logo"
                 style="max-width: 250px;">
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-6 col-md-5 col-xl-4 my-3">
            <h5 class="text-center mb-4">Recuperar Contraseña</h5>
            <p class="text-muted text-center">
                Ingresá tu email y te enviaremos un link para resetear tu contraseña.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="email"
                           class="form-control"
                           name="email"
                           placeholder="Tu email"
                           required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Enviar link
                    </button>
                </div>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'accounts:login' %}">Volver al login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

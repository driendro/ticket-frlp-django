{% extends 'base.html' %}

{% block title %}Email Enviado{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <i class="bi bi-envelope-check-fill text-success"
               style="font-size: 4rem;"></i>
            <h3 class="mt-3">¡Email enviado!</h3>
            <p class="text-muted">
                Si el email está registrado, recibirás un link
                para resetear tu contraseña en los próximos minutos.
            </p>
            <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">
                Volver al login
            </a>
        </div>
    </div>
</div>
{% endblock %}

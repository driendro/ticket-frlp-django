{% extends 'base.html' %}
{% block title %}¡Pago Exitoso!{% endblock %}
{% block navbar %}{% include 'comedor/_navbar.html' %}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body text-center p-5">
                    <div class="mb-4">
                        <i class="bi bi-check-circle-fill text-success"
                           style="font-size: 5rem;"></i>
                    </div>
                    <h2 class="fw-bold mb-3">¡Gracias por tu pago!</h2>
                    <p class="text-muted mb-4">
                        Tu compra fue procesada exitosamente.
                        Recibirás la confirmación por correo.
                    </p>
                    <a href="{% url 'comedor:index' %}" class="btn btn-success btn-lg px-5">
                        Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
